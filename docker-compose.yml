
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: my_db
      POSTGRES_USER: my_user
      POSTGRES_PASSWORD: my_pwd
    volumes:
      - /var/lib/postgresql/data
    ports:
      - "54320:5432"

  inventory:
    build: .
    container_name: inventory
    command: >
      sh -c "
      python manage.py makemigrations &&
      python manage.py migrate &&
      gunicorn inventory.wsgi:application -c gunicorn.conf.py
      "
    ports:
      - "3000:3000"
    env_file:
      - env_local.list
    depends_on:
      - db

